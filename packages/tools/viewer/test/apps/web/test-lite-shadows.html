<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Viewer Lite Shadows Test</title>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
            }
            #viewerContainer {
                width: 100vw;
                height: 100vh;
            }
            :not(:defined) > * {
                display: none;
            }
        </style>
        <script type="module" src="/packages/tools/viewer/src/lite/index.ts"></script>
    </head>
    <body>
        <div id="viewerContainer">
            <babylon-viewer
                source="https://raw.githubusercontent.com/BabylonJS/Assets/master/meshes/Georgia-Tech-Dragon/dragon.glb"
                shadow-quality="normal"
                environment-skybox="auto"
                camera-orbit="auto 0.85 auto"
            ></babylon-viewer>
        </div>
    </body>
</html>
