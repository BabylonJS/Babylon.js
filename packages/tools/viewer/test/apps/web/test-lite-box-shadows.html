<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Viewer Lite Box Shadow Test</title>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
            }
            #viewerContainer {
                width: 100vw;
                height: 100vh;
            }
            :not(:defined) > * {
                display: none;
            }
        </style>
        <script type="module" src="/packages/tools/viewer/src/lite/index.ts"></script>
    </head>
    <body>
        <div id="viewerContainer"></div>
        <script type="module">
            const params = new URLSearchParams(location.search);
            const box = params.get("box") || "1";
            const el = document.createElement("babylon-viewer");
            el.setAttribute("source", `/packages/tools/viewer/test/apps/web/box-${box}.gltf`);
            el.setAttribute("shadow-quality", "normal");
            el.setAttribute("environment-skybox", "auto");
            el.setAttribute("camera-orbit", "auto 0.85 auto");
            document.getElementById("viewerContainer").appendChild(el);
        </script>
    </body>
</html>
