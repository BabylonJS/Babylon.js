name: Continuous Code Simplifier

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      target_path:
        description: 'Target path to simplify (default: packages/**/src/**/*.{ts,tsx,js})'
        required: false
        default: 'packages/**/src/**/*.{ts,tsx,js}'

permissions:
  contents: write
  pull-requests: write

jobs:
  simplify-code:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run code simplification
        id: simplify
        run: |
          # Create a unique branch name
          BRANCH_NAME="code-simplifier/auto-simplify-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # Create and checkout new branch
          git checkout -b $BRANCH_NAME
          
          # Run custom code simplifier script
          TARGET_PATH="${{ github.event.inputs.target_path || 'packages/**/src/**/*.{ts,tsx,js}' }}"
          echo "Running code simplifier on: $TARGET_PATH"
          node scripts/code-simplifier.js --verbose "$TARGET_PATH" || true
          
          # Run ESLint with auto-fix for additional improvements
          npm run lint:check -- --fix || true
          
          # Run prettier to ensure consistent formatting
          npm run format:fix || true
          
          # Check if there are any changes
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No code simplifications found"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Code simplifications found"
            
            # Show summary of changes
            echo "=== Changes Summary ==="
            git diff --stat
          fi
      
      - name: Commit and push changes
        if: steps.simplify.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          git commit -m "chore: automated code simplification

          This commit contains automated code simplifications including:
          - ESLint auto-fixes for code quality issues
          - Prettier formatting improvements
          - Removal of unnecessary code patterns
          
          Generated by the continuous code simplifier workflow."
          
          git push origin ${{ steps.simplify.outputs.branch_name }}
      
      - name: Create Pull Request
        if: steps.simplify.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🤖 Automated Code Simplification',
              head: '${{ steps.simplify.outputs.branch_name }}',
              base: context.payload.repository.default_branch || 'master',
              body: `## Automated Code Simplification
              
              This PR contains automated code simplifications generated by the continuous code simplifier workflow.
              
              ### Changes Include:
              - ✨ ESLint auto-fixes for code quality improvements
              - 💅 Prettier formatting improvements
              - 🧹 Removal of unnecessary code patterns
              
              ### Review Guidelines:
              - Please review each change carefully
              - Ensure no functionality has been altered
              - Check that all tests still pass
              - Verify that the changes improve code readability
              
              ---
              
              *This PR was automatically generated by the [Code Simplifier Workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
              maintainer_can_modify: true
            });
            
            // Add label to the PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automated', 'code-quality']
            });
            
            console.log(`Pull request created: ${pr.html_url}`);
      
      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.simplify.outputs.has_changes }}" == "true" ]; then
            echo "✅ Code simplifications found and PR created"
          else
            echo "ℹ️ No code simplifications needed"
          fi
