# =============================================================================
# BrowserStack Automate SDK Configuration
# Used by browserstack-node-sdk to run Playwright tests on BrowserStack.
#
# Credentials are provided via environment variables:
#   BROWSERSTACK_USERNAME / BROWSERSTACK_ACCESS_KEY
# (set in .env for local dev, in Azure DevOps variable groups for CI)
# =============================================================================

# Credentials (overridden by env vars BROWSERSTACK_USERNAME / BROWSERSTACK_ACCESS_KEY)
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

# Reporting
projectName: Babylon.js
buildName: Babylon.js Tests
buildIdentifier: "#${BUILD_NUMBER}"

# Platform — single Chrome on macOS by default.
# The CI pipeline can override via BROWSERSTACK_BROWSER env var for
# nightly cross-browser runs (Firefox, Webkit).
platforms:
    - os: OS X
      osVersion: Sonoma
      browserName: chrome
      browserVersion: latest

# Parallel sessions per platform (account-level cap per build).
# Default to 1 as a safe baseline — browserstack-wait.sh sets
# BROWSERSTACK_PARALLELS based on actual session availability, and the
# Playwright config patches this value dynamically.
parallelsPerPlatform: 1

# BrowserStack Local — set to true to test against localhost/private servers.
# The SDK manages the tunnel automatically.
browserstackLocal: false

# Framework
framework: playwright

# Debugging — keep SDK output minimal to avoid 100k+ line CI logs.
# Only errors are captured; debug, network, and verbose console logs are off.
debug: false
networkLogs: false
consoleLogs: errors

# Session timeouts — perf tests have long page.evaluate() calls with no network
# activity; increase idle timeout to prevent premature disconnects.
idleTimeout: 300

# Test Observability — DISABLED.
# The SDK's gRPC telemetry module hits serialization errors on large test payloads
# (perf tests) causing "13 INTERNAL: Request message serialization failure" and
# preventing tests from running.  It also generates substantial log output.
# Re-enable per-run via BROWSERSTACK_TEST_OBSERVABILITY=true env var if needed.
testObservability: false
