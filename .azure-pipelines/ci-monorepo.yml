    # ============================================================================
    # VIEWER TESTS
    # No dependencies - runs immediately
    # ============================================================================
    - job: ViewerTests
      displayName: "Viewer tests"
      steps:
          - checkout: self
            clean: true
            fetchTags: false

          - task: NodeTool@0
            displayName: "Use Node 22.4.1"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                versionSpec: "22.4.1"

          - task: Npm@1
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            inputs:
                command: install

          - task: Npm@1
            displayName: "npm build"
            retryCountOnTaskFailure: 1
            inputs:
                command: custom
