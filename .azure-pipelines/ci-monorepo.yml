# =============================================================================
# CI-Monorepo Pipeline - Babylon.js
# Converted from Azure DevOps Classic Pipeline (Definition ID: 14)
#
# IMPORTANT SETUP NOTES:
# 1. Link variable groups (see VARIABLE-GROUPS.md):
#    - BabylonJS-CI-Infrastructure
#    - BabylonJS-BrowserStack (BROWSERSTACK_ACCESS_KEY, BROWSERSTACK_USERNAME)
#    - BabylonJS-Deployment (BASIC_AUTH, DEPLOYMENT_SERVER)
#
# 2. Fork build settings (allow secrets, require comments for non-team members)
#    must be configured in the Azure DevOps pipeline settings UI.
#
# 3. Authorize the GitHub service connection (GITHUB_SERVICE_CONNECTION)
#    for this pipeline.
#
# 4. Update the 'resources.pipelines' source names to match your actual
#    pipeline names in Azure DevOps.
# =============================================================================

trigger:
    batch: true
    branches:
        include:
            - master
    paths:
        exclude:
            - .build/config.json
            - CHANGELOG.md

pr:
    branches:
        include:
            - master

schedules:
    # Classic pipeline: midnight PST on Mon, Tue, Wed, Fri (daysToBuild: 23)
    # Cron is in UTC: midnight PST = 08:00 UTC
    - cron: "0 8 * * 1,2,3,5"
      displayName: Scheduled build
      branches:
          include:
              - master
      always: false # Only run if there are changes

resources:
    pipelines:
        # Build completion trigger - cd-publish pipeline (Definition 15)
        - pipeline: buildCompletionTrigger
          source: "Publish pipeline"
          trigger:
              branches:
                  include:
                      - master
        # Native tests artifact source - pipeline ID 36
        - pipeline: nativeTestsArtifact
          source: "BabylonNative Nightly CI"
          project: ContinousIntegration

variables:
    - group: BabylonJS-CI-Infrastructure
    - group: BabylonJS-BrowserStack
    - group: BabylonJS-Deployment
    - name: BuildName
      value: $(Build.SourceBranch)
    - name: BROWSERSTACK_BROWSER
      value: "chrome@143:OSX Sonoma"
    - name: system.debug
      value: false

pool:
    vmImage: ubuntu-latest

jobs:
    # ============================================================================
    # BUILD JOB
    # Builds UMD packages, prepares and uploads snapshot, posts PR comments
    # No dependencies - runs immediately
    # ============================================================================
    - job: Build
      displayName: "Build job"
      steps:
          - template: templates/checkout-with-tag-override.yml
            parameters:
                fetchDepth: 0

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - bash: |
                git diff --name-status $(git rev-parse origin/master) $(git rev-parse HEAD) | grep -q "what's new.md" && echo "##vso[task.setvariable variable=WhatsNewChanged]true"
                git diff --name-status $(git rev-parse origin/master) $(git rev-parse HEAD) | grep -q "package.json" && echo "##vso[task.setvariable variable=PackageJsonChanged]true"
                git diff --name-status $(git rev-parse origin/master) $(git rev-parse HEAD) | grep -q ".build/config.json" && echo "##vso[task.setvariable variable=ConfigJsonChanged]true"
                git diff --name-status $(git rev-parse origin/master) $(git rev-parse HEAD) | grep -q "smartFilter" && echo "##vso[task.setvariable variable=SmartFiltersChanged]true"

                git diff --name-status $(git rev-parse origin/master) $(git rev-parse HEAD)
            displayName: "Check git changes"
            continueOnError: true

          - bash: |
                # For scheduled/build-completion runs, run ALL visualization tests.
                # For PR/push runs, compute affected tags from the diff.
                if [ "$(Build.Reason)" = "Schedule" ] || [ "$(Build.Reason)" = "BuildCompletion" ]; then
                    TAGS="ALL"
                    echo "Scheduled/publish run — running ALL visualization tests"
                else
                    TAGS=$(node scripts/compute-affected-vis-tags.mjs)
                fi
                echo "Affected vis-test tags: $TAGS"
                echo "##vso[task.setvariable variable=AFFECTED_TAGS;isOutput=true]$TAGS"
            name: ComputeVisTags
            displayName: "Compute affected vis-test tags"
            continueOnError: true

          - template: templates/check-snapshot-exists.yml
            parameters:
                snapshotPath: "$(BuildName)"

          - script: |
                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_DELETE)?path=$(BuildName)" -X POST -H "Authorization: $(BASIC_AUTH)"
            displayName: "Clear snapshot"
            condition: and(succeeded(), eq(variables['SNAPSHOTEXISTS'], 'true'), not(eq(variables['Build.SourceBranchName'], 'master')))

          - task: GitHubComment@0
            displayName: "Tag your PR!"
            continueOnError: true
            condition: and(succeeded(), eq(variables['SNAPSHOTEXISTS'], 'false'))
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Please make sure to label your PR with "bug", "new feature" or "breaking change" label(s).
                    To prevent this PR from going to the changelog marked it with the "skip changelog" label.

          - task: GitHubComment@0
            displayName: "What's new comment"
            continueOnError: true
            condition: and(succeeded(), eq(variables['WHATSNEWCHANGED'], 'true'))
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    There is no need to update the "what's new.md" file. A changelog will be generated using the PR and its tags.

          - task: GitHubComment@0
            displayName: "Did package.json changed?"
            continueOnError: true
            condition: and(succeeded(), eq(variables['PACKAGEJSONCHANGED'], 'true'))
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Reviewer - this PR has made changes to one or more package.json files.

          - task: GitHubComment@0
            displayName: "Did build directory changed"
            continueOnError: true
            condition: and(succeeded(), eq(variables['CONFIGJSONCHANGED'], 'true'))
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Reviewer - this PR has made changes to the build configuration file.

                    *This build will release a new package on npm*

                    If that was unintentional please make sure to revert those changes or close this PR.

          - script: npm install
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - task: Npm@1
            displayName: "npm build umd"
            inputs:
                command: custom
                customCommand: "run build:umd"

          - task: Npm@1
            displayName: "npm build smart filters"
            condition: and(succeeded(), eq(variables['SMARTFILTERSCHANGED'], 'true'))
            inputs:
                command: custom
                customCommand: "run build:source:smart-filters"

          - task: Npm@1
            displayName: "npm build smart filters editor"
            condition: and(succeeded(), eq(variables['SMARTFILTERSCHANGED'], 'true'))
            inputs:
                command: custom
                customCommand: "run build:deployment -w @tools/smart-filters-editor"

          - task: Npm@1
            displayName: "Prepare snapshot"
            inputs:
                command: custom
                customCommand: "run prepare-snapshot"

          - task: Npm@1
            displayName: "Test es version of UMD packages"
            continueOnError: true
            inputs:
                command: custom
                customCommand: "run test:escheck"

          - task: Npm@1
            displayName: "Test UMD build"
            inputs:
                command: custom
                customCommand: "run build -w babylonjs-testproject"

          - script: |
                mkdir .snapshot/smartFiltersEditor
                cp -r packages/tools/smartFiltersEditor/dist/* .snapshot/smartFiltersEditor
            displayName: "Add Smart Filters Editor to snapshot"
            condition: and(succeeded(), eq(variables['SMARTFILTERSCHANGED'], 'true'))

          - script: |
                cd .snapshot
                zip -r ../snapshot.zip *
                cd ..

                curl $(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_UPLOAD) -i -X POST \
                  -H "Content-Type: multipart/form-data" \
                  -H "Authorization: $(BASIC_AUTH)" \
                  -F "path=$(BuildName)" \
                  -F "storageAccount=$(SNAPSHOTS_STORAGE_ACCOUNT)" \
                  -F "saveZip=true" \
                  -F "zip=@snapshot.zip"
            displayName: "Upload snapshot"

          - task: GitHubComment@0
            displayName: "Writing GitHub comment"
            continueOnError: true
            condition: and(succeeded(), eq(variables['SNAPSHOTEXISTS'], 'false'))
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Snapshot stored with reference name:
                    $(BuildName)

                    Test environment:
                    $(SNAPSHOT_CDN_URL)/$(BuildName)/index.html

                    To test a playground add it to the URL, for example:

                    $(SNAPSHOT_CDN_URL)/$(BuildName)/index.html#WGZLGJ#4600

                    Links to test your changes to core in the published versions of the Babylon tools (does not contain changes you made to the tools themselves):

                    https://playground.babylonjs.com/?snapshot=$(BuildName)
                    https://sandbox.babylonjs.com/?snapshot=$(BuildName)
                    https://gui.babylonjs.com/?snapshot=$(BuildName)
                    https://nme.babylonjs.com/?snapshot=$(BuildName)

                    To test the snapshot in the playground with a playground ID add it after the snapshot query string:

                    https://playground.babylonjs.com/?snapshot=$(BuildName)#BCU1XR#0

                    *If you made changes to the sandbox or playground in this PR, additional comments will be generated soon containing links to the dev versions of those tools.*

          - task: GitHubComment@0
            displayName: "Writing SFE GitHub comment"
            continueOnError: true
            condition: and(succeeded(), eq(variables['SMARTFILTERSCHANGED'], 'true'))
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Smart Filters Editor is available to test at:
                    https://sfe.babylonjs.com/?snapshot=$(BuildName)

    # ============================================================================
    # ES6
    # Builds ES6 modules and generates file size reports
    # No dependencies - runs immediately
    # ============================================================================
    - job: ES6
      displayName: "ES6"
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - script: npm install
            displayName: "npm install"
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - task: Npm@1
            displayName: "npm build es6"
            inputs:
                command: custom
                customCommand: "run build:es6"

          - bash: |
                npx nx run-many --target=prepublishOnly --all
            displayName: "Make sure es6 packages are ready"
            continueOnError: true

          - task: Npm@1
            displayName: "npm build modules size"
            inputs:
                command: custom
                customCommand: "run build -w @tools/tests"

          - task: Npm@1
            displayName: "npm generate modules size"
            inputs:
                command: custom
                customCommand: "run generate-file-size-report -w @tools/tests"

          - script: |
                cd packages/tools/tests/dist
                zip ../../../../snapshot.zip fileSizes.json
                cd ../../../..

                curl $(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_UPLOAD) -i -X POST \
                  -H "Content-Type: multipart/form-data" \
                  -H "Authorization: $(BASIC_AUTH)" \
                  -F "path=$(BuildName)" \
                  -F "storageAccount=$(SNAPSHOTS_STORAGE_ACCOUNT)" \
                  -F "zip=@snapshot.zip"
            displayName: "Upload file size results"

    # ============================================================================
    # FORMAT, LINT, AND MORE
    # Checks formatting, linting, and circular dependencies
    # No dependencies - runs immediately
    # ============================================================================
    - job: FormatLint
      displayName: "Format, Lint, and more"
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - script: npm install
            displayName: "npm install"
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - script: npx prettier --list-different "./packages/**/src/**/*.{ts,tsx,js,json,scss,css}"
            displayName: "Formatting"

          - script: npm run lint:check-ci
            displayName: "Linting"
            env:
                NODE_OPTIONS: "--max-old-space-size=8192"

          - script: npx --yes dpdm -T --no-tree ./packages/dev/core/src/**/*
            displayName: "Circular dependencies"

    # ============================================================================
    # TYPEDOC CHECK
    # Only runs on PRs (not on master branch)
    # No dependencies - runs immediately
    # ============================================================================
    - job: TypeDocCheck
      displayName: "TypeDoc check"
      condition: ne(variables['Build.SourceBranch'], 'refs/heads/master')
      steps:
          - template: templates/checkout-with-tag-override.yml
            parameters:
                fetchDepth: 0

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - script: npm install
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - script: |
                git branch
                git fetch origin "+refs/heads/*:refs/remotes/origin/*"
                git checkout -B master origin/master
                git branch

                GIT_CHANGES_COMMAND="git diff $(Build.SourceVersion) --name-only --relative" npm run test:docs
            displayName: "Run TypeDoc test"
            continueOnError: true
            env:
                CI: "true"

          - task: PublishTestResults@2
            displayName: "Publish TypeDoc Results"
            condition: succeededOrFailed()
            inputs:
                testResultsFormat: JUnit
                testResultsFiles: "./junit.xml"

    # ============================================================================
    # UNIT TESTS
    # Depends on: Build
    # ============================================================================
    - job: UnitTests
      displayName: "Unit tests"
      dependsOn: Build
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - task: Npm@1
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            inputs:
                command: install

          - script: npm run test:unit
            displayName: "unit tests"
            retryCountOnTaskFailure: 2
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                HEADLESS: "true"

          - task: PublishTestResults@2
            displayName: "Publish Unit Test Results"
            condition: succeededOrFailed()
            inputs:
                testResultsFormat: JUnit
                testResultsFiles: "./junit.xml"

          # DISABLED in classic pipeline - integration tests:
          # - script: |
          #     export DISPLAY=:99
          #     Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          #     sleep 3
          #     npm run test:integration
          #   displayName: 'integration tests'
          #   continueOnError: true
          #   retryCountOnTaskFailure: 4
          #   env:
          #     CDN_BASE_URL: '$(SNAPSHOT_CDN_URL)/$(BuildName)'
          #     HEADLESS: 'true'

          # DISABLED in classic pipeline - interaction tests (moved to separate job):
          # - script: |
          #     npx playwright install --with-deps
          #     export CDN_BASE_URL="$(SNAPSHOT_CDN_URL)/$(Build.SourceBranch)"
          #     export BROWSERSTACK_USERNAME=$(BROWSERSTACK_USERNAME)
          #     export BROWSERSTACK_ACCESS_KEY=$(BROWSERSTACK_ACCESS_KEY)
          #     npm run test:interactions
          #   displayName: 'interaction tests'
          #   retryCountOnTaskFailure: 2
          #   env:
          #     CI: 'true'

    # ============================================================================
    # INTERACTION TESTS
    # Depends on: Build
    # ============================================================================
    - job: InteractionTests
      displayName: "Interaction tests"
      dependsOn: Build
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - template: templates/check-snapshot-exists.yml
            parameters:
                snapshotPath: "$(BuildName)/testResults/interactionplaywright"

          - script: |
                npm install
                npx playwright install --with-deps
            displayName: "npm install && playwright install"
            retryCountOnTaskFailure: 1

          - script: npm run test:interactions
            displayName: "run interaction tests"
            retryCountOnTaskFailure: 1
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                BROWSERSTACK_USERNAME: $(BROWSERSTACK_USERNAME)
                BROWSERSTACK_ACCESS_KEY: $(BROWSERSTACK_ACCESS_KEY)
                CI: "true"

          - script: |
                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_DELETE)?path=$(BuildName)/testResults/interactionplaywright" -X POST -H "Authorization: $(BASIC_AUTH)"
            displayName: "Delete test results"
            continueOnError: true
            condition: eq(variables['SNAPSHOTEXISTS'], 'true')

          - template: templates/upload-test-results.yml
            parameters:
                reportDir: "packages/tools/tests/playwright-report"
                fallbackReportDir: "playwright-report"
                deployPath: "$(BuildName)/testResults/interactionplaywright"
                continueOnError: true

          - task: GitHubComment@0
            displayName: "Writing GitHub comment"
            continueOnError: true
            condition: eq(variables['SNAPSHOTEXISTS'], 'false')
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Interaction tests

                    $(SNAPSHOT_CDN_URL)/$(BuildName)/testResults/interactionplaywright/index.html

          - task: PublishTestResults@2
            displayName: "Publish interaction test results"
            condition: succeededOrFailed()
            inputs:
                testResultsFormat: JUnit
                testResultsFiles: "./packages/tools/tests/junit.xml"

    # ============================================================================
    # VISUALIZATION TESTS - WEBGL 2
    # Depends on: Build
    # Runs on BrowserStack
    # ============================================================================
    - job: VisualizationWebGL2
      displayName: "Visualization tests - WebGL 2"
      dependsOn: Build
      condition: succeeded()
      variables:
          AFFECTED_TAGS: $[ dependencies.Build.outputs['ComputeVisTags.AFFECTED_TAGS'] ]
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - template: templates/check-snapshot-exists.yml
            parameters:
                snapshotPath: "$(BuildName)/testResults/webgl2playwright"

          - script: |
                npm install
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - bash: echo "No visualization tests affected by this change — skipping."
            displayName: "Skip — no affected tests"
            condition: eq(variables['AFFECTED_TAGS'], 'NONE')

          - bash: .azure-pipelines/browserstack-wait.sh npx playwright test --config ./playwright.browserstack.config.ts
            displayName: "WebGL2 BStack"
            condition: ne(variables['AFFECTED_TAGS'], 'NONE')
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                CI: "true"
                EXCLUDE_REGEX_ARRAY: "Procedural textures playground"
                BSTACK_TEST_TYPE: "webgl2"
                BSTACK_BUILD_NAME: "Visualization Tests - WebGL2"
                TIMEOUT: "27500"
                BROWSERSTACK_USERNAME: $(BROWSERSTACK_USERNAME)
                BROWSERSTACK_ACCESS_KEY: $(BROWSERSTACK_ACCESS_KEY)
                AFFECTED_TAGS: $(AFFECTED_TAGS)

          - script: |
                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_DELETE)?path=$(BuildName)/testResults/webgl2playwright" -X POST -H "Authorization: $(BASIC_AUTH)"
            displayName: "Delete test results"
            continueOnError: true
            condition: eq(variables['SNAPSHOTEXISTS'], 'true')

          - template: templates/upload-test-results.yml
            parameters:
                reportDir: "packages/tools/tests/playwright-report"
                fallbackReportDir: "playwright-report"
                deployPath: "$(BuildName)/testResults/webgl2playwright"
                continueOnError: true

          - task: GitHubComment@0
            displayName: "GitHub WebGL2 comment"
            condition: eq(variables['SNAPSHOTEXISTS'], 'false')
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    WebGL2 visualization test reporter:

                    $(SNAPSHOT_CDN_URL)/$(BuildName)/testResults/webgl2playwright/index.html

          - task: PublishTestResults@2
            displayName: "Publish webgl2 test results"
            condition: succeededOrFailed()
            inputs:
                testResultsFormat: JUnit
                testResultsFiles: "./packages/tools/tests/junit.xml"

    # ============================================================================
    # VISUALIZATION TESTS - WEBGPU
    # Depends on: Build
    # Runs on BrowserStack
    # ============================================================================
    - job: VisualizationWebGPU
      displayName: "Visualization tests - WebGPU"
      dependsOn: Build
      variables:
          AFFECTED_TAGS: $[ dependencies.Build.outputs['ComputeVisTags.AFFECTED_TAGS'] ]
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - template: templates/check-snapshot-exists.yml
            parameters:
                snapshotPath: "$(BuildName)/testResults/webgpuplaywright"

          - script: |
                npm install
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - bash: echo "No visualization tests affected by this change — skipping."
            displayName: "Skip — no affected tests"
            condition: eq(variables['AFFECTED_TAGS'], 'NONE')

          - bash: .azure-pipelines/browserstack-wait.sh npx playwright test --config ./playwright.browserstack.config.ts
            displayName: "WebGPU BStack"
            condition: ne(variables['AFFECTED_TAGS'], 'NONE')
            retryCountOnTaskFailure: 1
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                CI: "true"
                EXCLUDE_REGEX_ARRAY: "Sample depth texture,Render to 3D RT,apply-all-post-processes"
                BSTACK_TEST_TYPE: "webgpu"
                BSTACK_BUILD_NAME: "Visualization Tests - WebGPU"
                TIMEOUT: "27500"
                BROWSERSTACK_USERNAME: $(BROWSERSTACK_USERNAME)
                BROWSERSTACK_ACCESS_KEY: $(BROWSERSTACK_ACCESS_KEY)
                AFFECTED_TAGS: $(AFFECTED_TAGS)

          - script: |
                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_DELETE)?path=$(BuildName)/testResults/webgpuplaywright" -X POST -H "Authorization: $(BASIC_AUTH)"
            displayName: "Delete test results"
            continueOnError: true
            condition: eq(variables['SNAPSHOTEXISTS'], 'true')

          - template: templates/upload-test-results.yml
            parameters:
                reportDir: "packages/tools/tests/playwright-report"
                fallbackReportDir: "playwright-report"
                deployPath: "$(BuildName)/testResults/webgpuplaywright"
                continueOnError: true

          - task: GitHubComment@0
            displayName: "Writing GitHub comment"
            continueOnError: true
            condition: eq(variables['SNAPSHOTEXISTS'], 'false')
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    Visualization tests for WebGPU

                    $(SNAPSHOT_CDN_URL)/$(BuildName)/testResults/webgpuplaywright/index.html

          - task: PublishTestResults@2
            displayName: "Publish webgpu test results"
            condition: succeededOrFailed()
            inputs:
                testResultsFormat: JUnit
                testResultsFiles: "./packages/tools/tests/junit.xml"

    # ============================================================================
    # NATIVE TESTS (EXPERIMENTAL)
    # Depends on: Build
    # Runs on Windows agent pool
    # ============================================================================
    - job: NativeTests
      displayName: "Native tests (experimental)"
      dependsOn: Build
      timeoutInMinutes: 15
      pool:
          vmImage: windows-latest
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: DownloadPipelineArtifact@2
            displayName: "Download Pipeline Artifact"
            inputs:
                source: specific
                project: "$(DEVOPS_PROJECT_ID)"
                pipeline: 36
                runVersion: latest
                runBranch: "refs/heads/master"
                path: "$(Pipeline.Workspace)"

          - script: |
                for /f %%i in ('"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere" -property instanceId') do (
                  reg add HKCU\Software\Microsoft\VisualStudio\Debugger\JIT\{F200A7E7-DEA5-11D0-B854-00A0244A1DE2}\%%i /f /v Disabled /t REG_DWORD /d 1
                )

                reg query HKCU\Software\Microsoft\VisualStudio\Debugger\JIT\{F200A7E7-DEA5-11D0-B854-00A0244A1DE2} /s
            displayName: "Disable JIT Debugging for Script"

          - script: |
                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_SNAPSHOT_CHECK)?buildNumber=$(BuildName)&fileTocheck=cdnSnapshot.zip" -o ./tmp.json -H "Authorization: $(BASIC_AUTH)"
                findstr "true" .\tmp.json >nul 2>&1
                if %errorlevel% equ 0 (
                   echo snapshot exists
                ) else (
                    echo snapshot does not exist
                )

                curl "$(SNAPSHOT_CDN_URL)/$(BuildName)/cdnSnapshot.zip" -o snapshot.zip
                if errorlevel 1 exit /b %errorlevel%

                set destDir=..\BabylonNativeNightlyUnitTests\RelWithDebInfo\Assets
                for /f %%i in ('dir /b %destDir%\babylon*') do (
                  unzip -p snapshot.zip "**%%i" > %destDir%\%%i
                  if errorlevel 1 exit /b !errorlevel!
                )

                set destDir=..\BabylonNativeNightlyPlayground\RelWithDebInfo\Scripts
                for /f %%i in ('dir /b %destDir%\babylon*') do (
                  unzip -p snapshot.zip "**%%i" > %destDir%\%%i
                  if errorlevel 1 exit /b !errorlevel!
                )
            displayName: "Update scripts from snapshot"
            retryCountOnTaskFailure: 5

          - script: |
                cd
                cd ..\BabylonNativeNightlyUnitTests\RelWithDebInfo
                UnitTests.exe
            displayName: "Run unit tests"
            retryCountOnTaskFailure: 3

          - script: |
                cd
                cd ..\BabylonNativeNightlyPlayground\RelWithDebInfo
                Playground.exe app:///Scripts/validation_native.js
            displayName: "Run visualization tests"
            retryCountOnTaskFailure: 3

    # ============================================================================
    # PERFORMANCE TESTS
    # Depends on: Build
    # Runs on BrowserStack — each test runs baseline + candidate interleaved
    # on the same remote machine to ensure consistent comparison.
    # Non-blocking: failures do not fail the overall pipeline.
    # ============================================================================
    - job: PerformanceTests
      displayName: "Performance tests"
      dependsOn: Build
      continueOnError: true
      variables:
          AFFECTED_TAGS: $[ dependencies.Build.outputs['ComputeVisTags.AFFECTED_TAGS'] ]
      steps:
          - checkout: self
            clean: true
            fetchTags: false

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - script: npm install
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"

          - bash: .azure-pipelines/browserstack-wait.sh npx playwright test --config ./playwright.browserstack.config.ts
            displayName: "Run performance tests (BStack)"
            continueOnError: true
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                CI: "true"
                BSTACK_TEST_TYPE: "performance"
                BSTACK_BUILD_NAME: "Performance Tests - $(BuildName)"
                VISUALIZATION_PERF: "true"
                CDN_VERSION: "latest"
                CIWORKERS: "$(CIWORKERS)"
                TIMEOUT: "300000"
                PERF_COMMENT_FILE: "$(Build.ArtifactStagingDirectory)/perf-comment.md"
                BROWSERSTACK_USERNAME: $(BROWSERSTACK_USERNAME)
                BROWSERSTACK_ACCESS_KEY: $(BROWSERSTACK_ACCESS_KEY)
                AFFECTED_TAGS: $(AFFECTED_TAGS)
                BSTACK_SESSIONS_REQUIRED: "2"

          - bash: |
                if [ -f "$(Build.ArtifactStagingDirectory)/perf-comment.md" ]; then
                    COMMENT=$(cat "$(Build.ArtifactStagingDirectory)/perf-comment.md")
                    COMMENT="${COMMENT//'%'/'%25'}"
                    COMMENT="${COMMENT//$'\n'/'%0A'}"
                    COMMENT="${COMMENT//$'\r'/'%0D'}"
                    echo "##vso[task.setvariable variable=PERF_COMMENT]$COMMENT"
                    echo "##vso[task.setvariable variable=HAS_PERF_COMMENT]true"
                else
                    echo "No performance comment file found"
                    echo "##vso[task.setvariable variable=HAS_PERF_COMMENT]false"
                fi
            displayName: "Read performance comment"
            condition: succeededOrFailed()

          - task: GitHubComment@0
            displayName: "Post performance results"
            condition: and(succeededOrFailed(), eq(variables['HAS_PERF_COMMENT'], 'true'))
            continueOnError: true
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    $(PERF_COMMENT)

          - task: PublishTestResults@2
            displayName: "Publish performance test results"
            condition: succeededOrFailed()
            inputs:
                testResultsFormat: "JUnit"
                testResultsFiles: "junit.xml"
                testRunTitle: "Performance Tests"

    # ============================================================================
    # MEMORY LEAK TESTS
    # Depends on: Build
    # Runs memlab (Puppeteer/Chromium) on the CI agent — heap snapshots require
    # local Chrome DevTools Protocol access, so BrowserStack is not viable here.
    # Non-blocking: failures do not fail the overall pipeline.
    # ============================================================================
    - job: MemoryLeakTests
      displayName: "Memory leak tests"
      dependsOn: Build
      continueOnError: true
      timeoutInMinutes: 45
      steps:
          - checkout: self
            clean: true
            fetchTags: false

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - script: npm install
            displayName: "npm install"
            retryCountOnTaskFailure: 1

          - script: npm run test:memory-leaks -- --no-fail-fast
            displayName: "Run memory leak tests (ci suite)"
            continueOnError: true
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                MEMLEAK_COMMENT_FILE: "$(Build.ArtifactStagingDirectory)/memleak-comment.md"

          - script: npm run test:memory-leaks:packages -- --no-fail-fast
            displayName: "Run memory leak tests (packages suite)"
            continueOnError: true
            env:
                CDN_BASE_URL: "$(SNAPSHOT_CDN_URL)/$(BuildName)"
                MEMLEAK_COMMENT_FILE: "$(Build.ArtifactStagingDirectory)/memleak-comment.md"

          - bash: |
                if [ -f "$(Build.ArtifactStagingDirectory)/memleak-comment.md" ]; then
                    COMMENT=$(cat "$(Build.ArtifactStagingDirectory)/memleak-comment.md")
                    COMMENT="${COMMENT//'%'/'%25'}"
                    COMMENT="${COMMENT//$'\n'/'%0A'}"
                    COMMENT="${COMMENT//$'\r'/'%0D'}"
                    echo "##vso[task.setvariable variable=MEMLEAK_COMMENT]$COMMENT"
                    echo "##vso[task.setvariable variable=HAS_MEMLEAK_COMMENT]true"
                else
                    echo "No memory leak comment file found"
                    echo "##vso[task.setvariable variable=HAS_MEMLEAK_COMMENT]false"
                fi
            displayName: "Read memory leak comment"
            condition: succeededOrFailed()

          - task: GitHubComment@0
            displayName: "Post memory leak results"
            condition: and(succeededOrFailed(), eq(variables['HAS_MEMLEAK_COMMENT'], 'true'))
            continueOnError: true
            inputs:
                gitHubConnection: "$(GITHUB_SERVICE_CONNECTION)"
                repositoryName: "$(Build.Repository.Name)"
                comment: |
                    $(MEMLEAK_COMMENT)

    # ============================================================================
    # VIEWER TESTS
    # No dependencies - runs immediately
    # ============================================================================
    - job: ViewerTests
      displayName: "Viewer tests"
      steps:
          - template: templates/checkout-with-tag-override.yml

          - task: UseNode@1
            displayName: "Use Node 22.x"
            continueOnError: true
            retryCountOnTaskFailure: 1
            inputs:
                version: "22.x"

          - task: Npm@1
            displayName: "npm install"
            retryCountOnTaskFailure: 1
            inputs:
                command: install

          - task: Npm@1
            displayName: "npm build"
            retryCountOnTaskFailure: 1
            inputs:
                command: custom
                customCommand: "run build:dev"

          - script: |
                (npm run serve -w @tools/viewer &)
                npx playwright install --with-deps
                npm run test:playwright -w @tools/tests -- --project=viewer
            displayName: "run tests"
            retryCountOnTaskFailure: 1
            env:
                PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
                PUPPETEER_SKIP_DOWNLOAD: "true"
                CI: "true"
                BROWSER: "Chrome"

    # ============================================================================
    # DEPLOY
    # Depends on: Build, UnitTests, VisualizationWebGL2, ES6,
    #             VisualizationWebGPU, InteractionTests
    # Only runs on master/preview branch for Manual/ResourceTrigger/Schedule/
    # BuildCompletion builds
    # ============================================================================
    - job: Deploy
      displayName: "Deploy"
      dependsOn:
          - Build
          - UnitTests
          - VisualizationWebGL2
          - ES6
          - VisualizationWebGPU
          - InteractionTests
      condition: >-
          and(
            succeeded(),
            or(
              eq(variables['Build.SourceBranchName'], 'master'),
              eq(variables['Build.SourceBranchName'], 'preview')
            ),
            or(
              eq(variables['Build.Reason'], 'Manual'),
              eq(variables['Build.Reason'], 'ResourceTrigger'),
              eq(variables['Build.Reason'], 'Schedule'),
              eq(variables['Build.Reason'], 'BuildCompletion')
            )
          )
      steps:
          - template: templates/checkout-with-tag-override.yml

          - bash: mkdir download
            displayName: "Prepare download directory"

          - script: |
                curl "$(SNAPSHOT_CDN_URL)/$(BuildName)/cdnSnapshot.zip" -o snapshot.zip

                curl $(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_UPLOAD) -i -X POST \
                  -H "Content-Type: multipart/form-data" \
                  -H "Authorization: $(BASIC_AUTH)" \
                  -F "path=cdn/$(Build.SourceBranchName)" \
                  -F "storageAccount=$(SNAPSHOTS_STORAGE_ACCOUNT)" \
                  -F "zip=@snapshot.zip"

                curl "$(SNAPSHOT_CDN_URL)/$(BuildName)/fileSizes.json" -o fileSizes.json

                zip ./fileSize.zip fileSizes.json

                curl $(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_UPLOAD) -i -X POST \
                  -H "Content-Type: multipart/form-data" \
                  -H "Authorization: $(BASIC_AUTH)" \
                  -F "path=cdn/$(Build.SourceBranchName)" \
                  -F "storageAccount=$(SNAPSHOTS_STORAGE_ACCOUNT)" \
                  -F "zip=@fileSize.zip"
            displayName: "Update CDN"

          - script: |
                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_PURGE)?endpoint=$(CDN_ENDPOINT_CDN)&profileName=$(CDN_PROFILE_CDN)&wait=true" -i -H "Authorization: $(BASIC_AUTH)"

                curl "$(DEPLOYMENT_SERVER)/$(DEPLOY_ENDPOINT_PURGE)?endpoint=$(CDN_ENDPOINT_PREVIEW_CDN)&profileName=$(CDN_PROFILE_CDN)&wait=true" -i -H "Authorization: $(BASIC_AUTH)"
            displayName: "Purge CDN"
